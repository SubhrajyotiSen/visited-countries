<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Indian States I have visited</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="../style.css" rel="stylesheet" type="text/css" />
    <style>
      #map .full-map {
        max-width: 700px;
        margin: 0 auto;
        height: 700px;
      }

      #map-error {
        display: none;
        max-width: 700px;
        margin: 0 auto;
        text-align: center;
        color: #1a3a3a;
        font-weight: 700;
      }
    </style>
    <link href="../favicon.ico" rel="icon" type="image/png" />
    <meta property="og:title" content="Indian States I have visited" />
    <meta
      property="og:description"
      content="Interactive map of Indian states visited by Glauber Ramos"
    />
    <meta
      property="og:image"
      content="https://glauberramos.github.io/visited-countries/thumb.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header id="header">
      <img src="../backpack.png" alt="Backpack icon" title="Backpack icon" />
      <h1>Glauber's</h1>
      <h2 class="subheader">🇮🇳 visited indian states 🇮🇳</h2>
      <div id="header-info">
        <div id="statistic">
          <div class="number-section">
            <span class="passport-stamp">
              <span id="number-states" class="information">0</span>
              <span class="stamp-label">states/UTs</span>
            </span>
            <span class="divider">•</span>
            <span class="numbers">
              <span id="india-percent">0%</span>
              <span>of</span>
              <span>36</span>
            </span>
          </div>
          <p class="tagline">🇮🇳 "Unity in diversity" 🇮🇳</p>
        </div>
      </div>
    </header>
    <main id="map">
      <div id="svg" class="full-map"></div>
      <p id="map-error">Map could not be loaded right now. Please refresh and try again.</p>
      <div id="country-tooltip"></div>
    </main>
    <footer id="footer">
      <div class="footer-content">
        <p class="footer-quote">🌟 "Travel broadens the mind and deepens perspective" 🌟</p>
        <h4>
          Made with ❤️ & ☕ by
          <a href="http://www.glauberramos.com" target="_blank">Glauber Ramos</a>
          <span class="footer-divider">✦</span>
          <a href="https://github.com/glauberramos/visited-countries/" target="_blank"
            >📂 Fork on GitHub</a
          >
          <span class="footer-divider">✦</span>
          <a href="../">🌍 World map</a>
        </h4>
      </div>
    </footer>
    <script src="../d3.v4.min.js"></script>
    <script src="india.js"></script>
    <script src="india-script.js"></script>
  </body>
</html>
